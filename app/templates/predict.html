{% extends "base.html" %}
{% block title %}Classify — Freshcheck{% endblock %}

{% block content %}
<section class="page-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="bg-faded rounded p-5">
          <h2 class="section-heading mb-4 text-center">
            <span class="section-heading-upper">Drop a photo below</span>
            <span class="section-heading-lower">Classify Your Produce</span>
          </h2>

          <form id="upload-form" method="POST" enctype="multipart/form-data" action="{{ url_for('predict.upload') }}">
            <div id="dropzone" class="text-center p-5 rounded mb-3" style="border: 2px dashed #c8a97a; cursor:pointer; background: rgba(230,167,86,0.05); transition: all 0.2s;">
              <div style="font-size:2.5rem; margin-bottom:0.75rem;">&#9635;</div>
              <p class="fw-bold mb-1" style="font-family: Raleway;">Drop image here</p>
              <p class="small text-muted mb-0">or click to browse &mdash; JPG, PNG, WEBP up to 10MB</p>
              <input type="file" id="image-input" name="image" accept="image/*" style="display:none">
            </div>

            <div id="preview" hidden class="mb-3 text-center">
              <img id="preview-img" src="" alt="Preview" class="img-fluid rounded mb-2" style="max-height:280px; border:1px solid #dee2e6;">
              <p id="preview-name" class="small text-muted mb-0"></p>
            </div>

            <div class="text-center">
              <button type="submit" id="submit-btn" class="btn btn-primary btn-xl" disabled>Analyse Image</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
