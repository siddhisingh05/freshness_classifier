{% extends "base.html" %}
{% block title %}Forgot Password — FreshVision{% endblock %}

{% block content %}
<section class="page-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <div class="bg-faded rounded p-5">
          <h2 class="section-heading mb-4 text-center">
            <span class="section-heading-upper">No worries</span>
            <span class="section-heading-lower">Reset Password</span>
          </h2>
          <form method="POST">
            <div class="mb-4">
              <label class="form-label fw-bold" style="font-family:Raleway; font-size:0.8rem; text-transform:uppercase; letter-spacing:0.05em;">Username</label>
              <input type="text" class="form-control" name="username" required>
            </div>
            <button type="submit" class="btn btn-primary btn-xl w-100">Continue</button>
          </form>
          <p class="text-center mt-4 mb-0 small"><a href="{{ url_for('auth.login') }}">Back to Login</a></p>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
