{% extends "base.html" %}
{% block title %}Register — FreshVision{% endblock %}

{% block content %}
<section class="page-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <div class="bg-faded rounded p-5">
          <h2 class="section-heading mb-4 text-center">
            <span class="section-heading-upper">Get started</span>
            <span class="section-heading-lower">Create Account</span>
          </h2>

          <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="mb-3">
              <label class="form-label fw-bold" style="font-family:Raleway; font-size:0.8rem; text-transform:uppercase; letter-spacing:0.05em;">Username</label>
              <input type="text" class="form-control" name="username" required>
              <div class="form-text">Minimum 3 characters</div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold" style="font-family:Raleway; font-size:0.8rem; text-transform:uppercase; letter-spacing:0.05em;">Password</label>
              <input type="password" class="form-control" name="password" required>
              <div class="form-text">Minimum 6 characters</div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold" style="font-family:Raleway; font-size:0.8rem; text-transform:uppercase; letter-spacing:0.05em;">Security Question</label>
              <select class="form-control" name="secret_question" required>
                <option value="">-- Select a question --</option>
                {% for q in questions %}
                  <option value="{{ q }}">{{ q }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="mb-4">
              <label class="form-label fw-bold" style="font-family:Raleway; font-size:0.8rem; text-transform:uppercase; letter-spacing:0.05em;">Your Answer</label>
              <input type="text" class="form-control" name="secret_answer" required>
              <div class="form-text">Answer is not case sensitive</div>
            </div>
            <button type="submit" class="btn btn-primary btn-xl w-100">Create Account</button>
          </form>

          <p class="text-center mt-4 mb-0 small">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
